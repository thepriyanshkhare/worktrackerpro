<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daily Work Tracker — Priyansh Khare</title>
<style>
  :root {
    --bg: #0f172a;
    --card: #1e293b;
    --border: #334155;
    --text: #f1f5f9;
    --text-muted: #94a3b8;
    --accent-blue: #3b82f6;
    --accent-blue-hover: #2563eb;
    --high: #E24B4A;
    --medium: #BA7517;
    --low: #639922;
    --done-ring: #22c55e;
    --amber: #f59e0b;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    height: 100vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  /* Top Bar */
  .topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 24px;
    background: var(--card);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    gap: 16px;
  }

  .topbar-left {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .avatar {
    width: 36px; height: 36px; border-radius: 50%;
    background: var(--accent-blue);
    display: flex; align-items: center; justify-content: center;
    font-weight: 700; font-size: 14px; color: #fff;
  }

  .user-info { display: flex; flex-direction: column; gap: 2px; }
  .user-name { font-weight: 600; font-size: 14px; }
  .user-role { font-size: 12px; color: var(--text-muted); }

  .topbar-center { display: flex; flex-direction: column; align-items: center; gap: 2px; }
  .live-clock { font-variant-numeric: tabular-nums; font-weight: 700; font-size: 18px; letter-spacing: 1px; }
  .live-date { font-size: 12px; color: var(--text-muted); }

  .topbar-right { display: flex; align-items: center; gap: 16px; }

  .btn {
    background: var(--accent-blue);
    color: #fff;
    border: none;
    padding: 8px 16px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 13px;
    font-weight: 600;
    transition: background 0.2s;
  }
  .btn:hover { background: var(--accent-blue-hover); }
  .btn-secondary { background: transparent; border: 1px solid var(--border); color: var(--text); }
  .btn-secondary:hover { background: rgba(255,255,255,0.05); }
  .btn-danger { background: #7f1d1d; }
  .btn-danger:hover { background: #991b1b; }
  .btn-small { padding: 4px 10px; font-size: 12px; }

  .bell-wrap { position: relative; cursor: pointer; padding: 6px; }
  .bell-wrap svg { width: 20px; height: 20px; fill: none; stroke: currentColor; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; color: var(--text); }
  .bell-badge {
    position: absolute; top: 2px; right: 2px;
    width: 16px; height: 16px; border-radius: 50%;
    background: #dc2626; color: #fff; font-size: 10px; font-weight: 700;
    display: flex; align-items: center; justify-content: center;
  }
  .bell-badge.hidden { display: none; }

  .notif-dropdown {
    position: absolute; top: 44px; right: 12px;
    width: 320px; max-height: 360px; overflow-y: auto;
    background: var(--card); border: 1px solid var(--border);
    border-radius: 8px; box-shadow: 0 10px 30px rgba(0,0,0,0.4);
    z-index: 50; display: none; flex-direction: column;
  }
  .notif-dropdown.open { display: flex; }
  .notif-header { display: flex; align-items: center; justify-content: space-between; padding: 12px 16px; border-bottom: 1px solid var(--border); font-size: 13px; font-weight: 600; }
  .notif-item { padding: 10px 16px; border-bottom: 1px solid var(--border); font-size: 12px; cursor: pointer; transition: background 0.15s; }
  .notif-item:hover { background: rgba(255,255,255,0.03); }
  .notif-item.unread { border-left: 3px solid var(--accent-blue); }
  .notif-empty { padding: 24px; text-align: center; color: var(--text-muted); font-size: 13px; }
  .notif-time { color: var(--text-muted); font-size: 11px; margin-top: 4px; }

  /* Main Layout */
  .main {
    flex: 1;
    display: flex;
    overflow: hidden;
  }

  /* Left: SVG Canvas */
  .svg-canvas-wrap {
    flex: 1;
    position: relative;
    overflow: hidden;
    background: radial-gradient(circle at center, rgba(30,41,59,0.6) 0%, var(--bg) 70%);
  }
  .svg-canvas-wrap svg { width: 100%; height: 100%; display: block; }

  /* Right Panel */
  .right-panel {
    width: 380px;
    display: flex;
    flex-direction: column;
    border-left: 1px solid var(--border);
    background: var(--card);
    flex-shrink: 0;
  }

  .detail-panel {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
  }
  .detail-placeholder {
    height: 100%;
    display: flex; align-items: center; justify-content: center;
    color: var(--text-muted); font-size: 14px; text-align: center;
  }

  .detail-header { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; margin-bottom: 12px; }
  .detail-title { font-size: 18px; font-weight: 700; line-height: 1.3; flex: 1; }
  .detail-date { font-size: 12px; color: var(--text-muted); margin-bottom: 12px; }
  .detail-desc { font-size: 13px; line-height: 1.6; color: #cbd5e1; margin-bottom: 16px; white-space: pre-wrap; }

  .badge {
    display: inline-block; padding: 3px 10px; border-radius: 4px;
    font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px;
    color: #fff;
  }
  .badge-high { background: var(--high); }
  .badge-medium { background: var(--medium); }
  .badge-low { background: var(--low); }
  .badge-amber { background: var(--amber); color: #1a1a1a; }

  .status-toggles { display: flex; gap: 8px; margin-bottom: 20px; }
  .status-btn {
    flex: 1; padding: 8px; border-radius: 6px; border: 1px solid var(--border);
    background: transparent; color: var(--text-muted); font-size: 12px; font-weight: 600;
    cursor: pointer; transition: all 0.2s;
  }
  .status-btn.active { background: rgba(59,130,246,0.15); color: var(--accent-blue); border-color: var(--accent-blue); }
  .status-btn:hover { color: var(--text); }

  .section-title { font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.8px; color: var(--text-muted); margin-bottom: 8px; margin-top: 16px; }

  .comment-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 10px; }
  .comment-item { background: rgba(255,255,255,0.03); border-radius: 6px; padding: 10px 12px; font-size: 12px; }
  .comment-meta { color: var(--text-muted); font-size: 11px; margin-bottom: 4px; }
  .comment-input { width: 100%; padding: 8px 10px; border-radius: 6px; border: 1px solid var(--border); background: rgba(255,255,255,0.03); color: var(--text); font-size: 12px; outline: none; }
  .comment-input:focus { border-color: var(--accent-blue); }

  .reminder-card { background: rgba(245,158,11,0.08); border: 1px solid rgba(245,158,11,0.3); border-radius: 6px; padding: 10px 12px; font-size: 12px; margin-bottom: 10px; }
  .reminder-card .reminder-label { font-weight: 600; color: var(--amber); margin-bottom: 4px; }
  .reminder-form { display: flex; gap: 8px; margin-top: 8px; }
  .reminder-form input { flex: 1; padding: 6px 8px; border-radius: 4px; border: 1px solid var(--border); background: rgba(255,255,255,0.03); color: var(--text); font-size: 12px; outline: none; }
  .reminder-form input:focus { border-color: var(--accent-blue); }
  .reminder-form input[type="datetime-local"] { flex: 1.5; }

  /* To-Do Widget */
  .todo-widget {
    height: 220px;
    border-top: 1px solid var(--border);
    padding: 16px 20px;
    display: flex;
    flex-direction: column;
    flex-shrink: 0;
  }
  .todo-title { font-size: 13px; font-weight: 700; margin-bottom: 10px; display: flex; align-items: center; justify-content: space-between; }
  .todo-list { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 6px; margin-bottom: 8px; }
  .todo-item { display: flex; align-items: center; gap: 8px; padding: 6px 8px; border-radius: 4px; transition: background 0.15s; }
  .todo-item:hover { background: rgba(255,255,255,0.03); }
  .todo-item input[type="checkbox"] { width: 14px; height: 14px; cursor: pointer; accent-color: var(--accent-blue); }
  .todo-item .todo-text { flex: 1; font-size: 12px; transition: all 0.2s; }
  .todo-item.done .todo-text { text-decoration: line-through; color: var(--text-muted); }
  .todo-item .todo-delete { opacity: 0; cursor: pointer; color: var(--text-muted); font-size: 14px; transition: opacity 0.15s, color 0.15s; padding: 0 4px; }
  .todo-item:hover .todo-delete { opacity: 1; }
  .todo-item .todo-delete:hover { color: #ef4444; }
  .todo-add { width: 100%; padding: 6px 10px; border-radius: 4px; border: 1px solid var(--border); background: rgba(255,255,255,0.03); color: var(--text); font-size: 12px; outline: none; }
  .todo-add:focus { border-color: var(--accent-blue); }
  .todo-empty { text-align: center; color: var(--text-muted); font-size: 12px; padding: 8px 0; }

  /* Modal */
  .modal-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.6);
    display: none; align-items: center; justify-content: center;
    z-index: 100; backdrop-filter: blur(4px);
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--card); border: 1px solid var(--border); border-radius: 10px;
    width: 480px; max-width: 90vw; max-height: 90vh; overflow-y: auto;
    padding: 24px; box-shadow: 0 20px 50px rgba(0,0,0,0.5);
  }
  .modal-title { font-size: 18px; font-weight: 700; margin-bottom: 20px; }
  .modal-field { margin-bottom: 14px; }
  .modal-field label { display: block; font-size: 12px; font-weight: 600; color: var(--text-muted); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px; }
  .modal-field input, .modal-field textarea, .modal-field select {
    width: 100%; padding: 8px 10px; border-radius: 6px; border: 1px solid var(--border);
    background: rgba(255,255,255,0.03); color: var(--text); font-size: 13px; outline: none;
  }
  .modal-field input:focus, .modal-field textarea:focus, .modal-field select:focus { border-color: var(--accent-blue); }
  .modal-field textarea { min-height: 80px; resize: vertical; }
  .modal-field select { cursor: pointer; }
  .modal-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 8px; }

  /* SVG Node Styles */
  .node-group { cursor: pointer; transition: opacity 0.2s; }
  .node-group:hover { opacity: 0.9; }
  .node-circle { transition: stroke-width 0.2s, fill 0.2s; }
  .node-pulse {
    animation: pulse-ring 1.8s ease-out infinite;
    transform-origin: center;
  }
  @keyframes pulse-ring {
    0% { transform: scale(1); opacity: 0.7; }
    100% { transform: scale(1.6); opacity: 0; }
  }
  .node-done-ring { stroke-dasharray: 4 3; }
  .node-selected { fill: rgba(59,130,246,0.25); stroke: var(--accent-blue); stroke-width: 3; }
  .spoke { stroke-dasharray: 6 4; stroke: var(--border); stroke-width: 1.5; opacity: 0.6; }
  .hub-circle { fill: rgba(59,130,246,0.1); stroke: var(--accent-blue); stroke-width: 2; }
  .hub-text { fill: var(--text); font-size: 13px; font-weight: 600; text-anchor: middle; }
  .hub-sub { fill: var(--text-muted); font-size: 11px; text-anchor: middle; }
  .node-title { fill: var(--text); font-size: 11px; font-weight: 600; text-anchor: middle; }
  .node-meta { fill: var(--text-muted); font-size: 10px; text-anchor: middle; }
  .node-badge { fill: #dc2626; font-size: 9px; font-weight: 700; text-anchor: middle; }
  .empty-msg { fill: var(--text-muted); font-size: 13px; text-anchor: middle; }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: #475569; }
</style>
</head>
<body>

<!-- Top Bar -->
<div class="topbar">
  <div class="topbar-left">
    <div class="avatar">P</div>
    <div class="user-info">
      <div class="user-name">Priyansh Khare</div>
      <div class="user-role">CP-RM · Lumen</div>
    </div>
  </div>
  <div class="topbar-center">
    <div class="live-clock" id="clock">00:00:00</div>
    <div class="live-date" id="date">Loading...</div>
  </div>
  <div class="topbar-right">
    <div class="bell-wrap" id="bellWrap">
      <svg viewBox="0 0 24 24"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
      <div class="bell-badge hidden" id="bellBadge">0</div>
      <div class="notif-dropdown" id="notifDropdown">
        <div class="notif-header">
          <span>Notifications</span>
          <button class="btn btn-small btn-secondary" id="markAllRead">Mark all read</button>
        </div>
        <div id="notifList"></div>
      </div>
    </div>
    <button class="btn" id="openModalBtn">Add Task</button>
  </div>
</div>

<!-- Main -->
<div class="main">
  <!-- SVG Canvas -->
  <div class="svg-canvas-wrap" id="svgWrap">
    <svg id="svgCanvas" xmlns="http://www.w3.org/2000/svg"></svg>
  </div>

  <!-- Right Panel -->
  <div class="right-panel">
    <div class="detail-panel" id="detailPanel">
      <div class="detail-placeholder" id="detailPlaceholder">Select a task to view details</div>
      <div id="detailContent" style="display:none;">
        <div class="detail-header">
          <div class="detail-title" id="dTitle"></div>
          <div class="badge" id="dBadge"></div>
        </div>
        <div class="detail-date" id="dDate"></div>
        <div class="detail-desc" id="dDesc"></div>

        <div class="section-title">Status</div>
        <div class="status-toggles" id="statusToggles">
          <button class="status-btn" data-status="To Do">To Do</button>
          <button class="status-btn" data-status="In Progress">In Progress</button>
          <button class="status-btn" data-status="Done">Done</button>
        </div>

        <div class="section-title">Comments</div>
        <div class="comment-list" id="commentList"></div>
        <input class="comment-input" id="commentInput" type="text" placeholder="Add a comment... (Enter to submit)" />

        <div class="section-title">Reminder</div>
        <div id="reminderActive"></div>
        <div class="reminder-form">
          <input type="text" id="reminderNote" placeholder="Note" />
          <input type="datetime-local" id="reminderTime" />
          <button class="btn btn-small" id="setReminderBtn">Set</button>
        </div>

        <button class="btn btn-danger btn-small" id="deleteTaskBtn" style="margin-top:20px;">Delete Task</button>
      </div>
    </div>

    <!-- To-Do Widget -->
    <div class="todo-widget">
      <div class="todo-title">
        <span>To-Do</span>
        <span style="font-size:11px; color:var(--text-muted);" id="todoCount">0 items</span>
      </div>
      <div class="todo-list" id="todoList"></div>
      <input class="todo-add" id="todoInput" type="text" placeholder="Add a quick to-do... (Enter)" />
    </div>
  </div>
</div>

<!-- Add Task Modal -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <div class="modal-title">Add New Task</div>
    <div class="modal-field">
      <label>Title</label>
      <input type="text" id="mTitle" placeholder="Task title" />
    </div>
    <div class="modal-field">
      <label>Description</label>
      <textarea id="mDesc" placeholder="Task description"></textarea>
    </div>
    <div class="modal-field">
      <label>Priority</label>
      <select id="mPriority">
        <option value="High">High</option>
        <option value="Medium" selected>Medium</option>
        <option value="Low">Low</option>
      </select>
    </div>
    <div class="modal-field">
      <label>Status</label>
      <select id="mStatus">
        <option value="To Do" selected>To Do</option>
        <option value="In Progress">In Progress</option>
        <option value="Done">Done</option>
      </select>
    </div>
    <div class="modal-actions">
      <button class="btn btn-secondary" id="modalCancel">Cancel</button>
      <button class="btn" id="modalAdd">Add</button>
    </div>
  </div>
</div>

<script>
(function() {
  'use strict';

  const LS_KEY = 'workTracker_v1';

  // Default data
  function defaultData() {
    return { tasks: [], todos: [], notifications: [], lastId: 0 };
  }

  function loadData() {
    try {
      const raw = localStorage.getItem(LS_KEY);
      if (raw) return JSON.parse(raw);
    } catch (e) {}
    return defaultData();
  }

  function saveData() {
    localStorage.setItem(LS_KEY, JSON.stringify(data));
  }

  let data = loadData();
  let selectedTaskId = null;
  let notifOpen = false;

  // Clock
  function updateClock() {
    const now = new Date();
    document.getElementById('clock').textContent = now.toLocaleTimeString('en-GB', { hour12: false });
    document.getElementById('date').textContent = now.toLocaleDateString('en-GB', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
  }
  setInterval(updateClock, 1000);
  updateClock();

  // ID generator
  function nextId() {
    data.lastId = (data.lastId || 0) + 1;
    return data.lastId;
  }

  // Priority colors
  const priorityColors = { High: '#E24B4A', Medium: '#BA7517', Low: '#639922' };
  const priorityClasses = { High: 'badge-high', Medium: 'badge-medium', Low: 'badge-low' };

  // SVG rendering
  function renderSVG() {
    const svg = document.getElementById('svgCanvas');
    const wrap = document.getElementById('svgWrap');
    const w = wrap.clientWidth;
    const h = wrap.clientHeight;
    svg.setAttribute('viewBox', `0 0 ${w} ${h}`);
    svg.innerHTML = '';

    const cx = w / 2;
    const cy = h / 2;
    const hubR = 44;

    // Hub
    const hubG = document.createElementNS('http://www.w3.org/2000/svg', 'g');
    const hubCircle = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
    hubCircle.setAttribute('cx', cx); hubCircle.setAttribute('cy', cy); hubCircle.setAttribute('r', hubR);
    hubCircle.setAttribute('class', 'hub-circle');
    hubG.appendChild(hubCircle);

    const hubText1 = document.createElementNS('http://www.w3.org/2000/svg', 'text');
    hubText1.setAttribute('x', cx); hubText1.setAttribute('y', cy - 4);
    hubText1.setAttribute('class', 'hub-text');
    hubText1.textContent = 'Priyansh';
    hubG.appendChild(hubText1);

    const hubText2 = document.createElementNS('http://www.w3.org/2000/svg', 'text');
    hubText2.setAttribute('x', cx); hubText2.setAttribute('y', cy + 10);
    hubText2.setAttribute('class', 'hub-sub');
    hubText2.textContent = 'CP-RM · Lumen';
    hubG.appendChild(hubText2);

    const hubText3 = document.createElementNS('http://www.w3.org/2000/svg', 'text');
    hubText3.setAttribute('x', cx); hubText3.setAttribute('y', cy + 24);
    hubText3.setAttribute('class', 'hub-sub');
    hubText3.textContent = `${data.tasks.length} task${data.tasks.length !== 1 ? 's' : ''}`;
    hubG.appendChild(hubText3);

    svg.appendChild(hubG);

    if (data.tasks.length === 0) {
      const empty = document.createElementNS('http://www.w3.org/2000/svg', 'text');
      empty.setAttribute('x', cx); empty.setAttribute('y', cy + hubR + 40);
      empty.setAttribute('class', 'empty-msg');
      empty.textContent = 'No tasks yet — add your first task';
      svg.appendChild(empty);
      return;
    }

    const maxRadius = Math.min(w, h) / 2 - 90;
    const radius = Math.max(120, maxRadius);
    const angleStep = (2 * Math.PI) / data.tasks.length;

    data.tasks.forEach((task, i) => {
      const angle = angleStep * i - Math.PI / 2;
      const nx = cx + Math.cos(angle) * radius;
      const ny = cy + Math.sin(angle) * radius;
      const nodeR = 34;
      const color = priorityColors[task.priority] || '#94a3b8';

      // Spoke
      const spoke = document.createElementNS('http://www.w3.org/2000/svg', 'line');
      spoke.setAttribute('x1', cx + Math.cos(angle) * hubR);
      spoke.setAttribute('y1', cy + Math.sin(angle) * hubR);
      spoke.setAttribute('x2', nx - Math.cos(angle) * nodeR);
      spoke.setAttribute('y2', ny - Math.sin(angle) * nodeR);
      spoke.setAttribute('class', 'spoke');
      svg.appendChild(spoke);

      const g = document.createElementNS('http://www.w3.org/2000/svg', 'g');
      g.setAttribute('class', 'node-group');
      g.addEventListener('click', () => selectTask(task.id));

      // In Progress pulse ring
      if (task.status === 'In Progress') {
        const pulse = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
        pulse.setAttribute('cx', nx); pulse.setAttribute('cy', ny); pulse.setAttribute('r', nodeR + 6);
        pulse.setAttribute('fill', 'none'); pulse.setAttribute('stroke', color); pulse.setAttribute('stroke-width', '2');
        pulse.setAttribute('class', 'node-pulse');
        g.appendChild(pulse);
      }

      // Done outer dashed ring
      if (task.status === 'Done') {
        const doneRing = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
        doneRing.setAttribute('cx', nx); doneRing.setAttribute('cy', ny); doneRing.setAttribute('r', nodeR + 6);
        doneRing.setAttribute('fill', 'none'); doneRing.setAttribute('stroke', 'var(--done-ring)'); doneRing.setAttribute('stroke-width', '2');
        doneRing.setAttribute('class', 'node-done-ring');
        g.appendChild(doneRing);
      }

      // Main circle
      const circle = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
      circle.setAttribute('cx', nx); circle.setAttribute('cy', ny); circle.setAttribute('r', nodeR);
      circle.setAttribute('fill', selectedTaskId === task.id ? 'rgba(59,130,246,0.25)' : 'var(--card)');
      circle.setAttribute('stroke', selectedTaskId === task.id ? 'var(--accent-blue)' : color);
      circle.setAttribute('stroke-width', selectedTaskId === task.id ? '3' : '2');
      circle.setAttribute('class', 'node-circle');
      g.appendChild(circle);

      // Title (truncated)
      const title = document.createElementNS('http://www.w3.org/2000/svg', 'text');
      title.setAttribute('x', nx); title.setAttribute('y', ny - 2);
      title.setAttribute('class', 'node-title');
      let t = task.title;
      if (t.length > 14) t = t.slice(0, 13) + '…';
      title.textContent = t;
      g.appendChild(title);

      // Priority + Status
      const meta = document.createElementNS('http://www.w3.org/2000/svg', 'text');
      meta.setAttribute('x', nx); meta.setAttribute('y', ny + 12);
      meta.setAttribute('class', 'node-meta');
      meta.textContent = `${task.priority} · ${task.status}`;
      g.appendChild(meta);

      // Notification badge (comments + pending reminders)
      const commentCount = (task.comments || []).length;
      const pendingReminders = (task.reminders || []).filter(r => !r.triggered).length;
      const badgeCount = commentCount + pendingReminders;
      if (badgeCount > 0) {
        const badgeR = 10;
        const bx = nx + nodeR - 2;
        const by = ny - nodeR + 2;
        const badgeCircle = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
        badgeCircle.setAttribute('cx', bx); badgeCircle.setAttribute('cy', by); badgeCircle.setAttribute('r', badgeR);
        badgeCircle.setAttribute('fill', '#dc2626');
        g.appendChild(badgeCircle);
        const badgeText = document.createElementNS('http://www.w3.org/2000/svg', 'text');
        badgeText.setAttribute('x', bx); badgeText.setAttribute('y', by + 3);
        badgeText.setAttribute('class', 'node-badge');
        badgeText.textContent = badgeCount > 9 ? '9+' : badgeCount;
        g.appendChild(badgeText);
      }

      svg.appendChild(g);
    });
  }

  // Select task
  function selectTask(id) {
    selectedTaskId = id === selectedTaskId ? null : id;
    renderSVG();
    renderDetail();
  }

  // Render detail panel
  function renderDetail() {
    const placeholder = document.getElementById('detailPlaceholder');
    const content = document.getElementById('detailContent');
    if (!selectedTaskId) {
      placeholder.style.display = 'flex';
      content.style.display = 'none';
      return;
    }
    const task = data.tasks.find(t => t.id === selectedTaskId);
    if (!task) { selectedTaskId = null; renderDetail(); return; }

    placeholder.style.display = 'none';
    content.style.display = 'block';

    document.getElementById('dTitle').textContent = task.title;
    const badge = document.getElementById('dBadge');
    badge.textContent = task.priority;
    badge.className = 'badge ' + (priorityClasses[task.priority] || '');
    document.getElementById('dDate').textContent = new Date(task.created).toLocaleString('en-GB');
    document.getElementById('dDesc').textContent = task.description || '';

    // Status toggles
    document.querySelectorAll('.status-btn').forEach(btn => {
      btn.classList.toggle('active', btn.dataset.status === task.status);
      btn.onclick = () => {
        task.status = btn.dataset.status;
        saveData();
        renderSVG();
        renderDetail();
      };
    });

    // Comments
    const cList = document.getElementById('commentList');
    cList.innerHTML = '';
    (task.comments || []).forEach(c => {
      const div = document.createElement('div');
      div.className = 'comment-item';
      div.innerHTML = `<div class="comment-meta">${new Date(c.time).toLocaleString('en-GB')}</div><div>${escapeHtml(c.text)}</div>`;
      cList.appendChild(div);
    });
    if ((task.comments || []).length === 0) {
      cList.innerHTML = '<div style="color:var(--text-muted); font-size:12px; padding:4px 0;">No comments yet.</div>';
    }

    // Reminders
    const remActive = document.getElementById('reminderActive');
    remActive.innerHTML = '';
    const activeRem = (task.reminders || []).filter(r => !r.triggered);
    if (activeRem.length > 0) {
      activeRem.forEach(r => {
        const div = document.createElement('div');
        div.className = 'reminder-card';
        div.innerHTML = `<div class="reminder-label">${escapeHtml(r.note || 'Reminder')}</div><div>${new Date(r.time).toLocaleString('en-GB')}</div>`;
        remActive.appendChild(div);
      });
    }
  }

  // To-Do Widget
  function renderTodos() {
    const list = document.getElementById('todoList');
    list.innerHTML = '';
    if (data.todos.length === 0) {
      list.innerHTML = '<div class="todo-empty">No to-dos yet</div>';
    } else {
      data.todos.forEach((todo, idx) => {
        const div = document.createElement('div');
        div.className = 'todo-item' + (todo.done ? ' done' : '');
        div.innerHTML = `
          <input type="checkbox" ${todo.done ? 'checked' : ''} data-idx="${idx}">
          <div class="todo-text">${escapeHtml(todo.text)}</div>
          <div class="todo-delete" data-idx="${idx}">&times;</div>
        `;
        list.appendChild(div);
      });
    }
    document.getElementById('todoCount').textContent = `${data.todos.length} item${data.todos.length !== 1 ? 's' : ''}`;

    // Event delegation
    list.querySelectorAll('input[type="checkbox"]').forEach(cb => {
      cb.addEventListener('change', e => {
        const idx = +e.target.dataset.idx;
        data.todos[idx].done = e.target.checked;
        saveData();
        renderTodos();
      });
    });
    list.querySelectorAll('.todo-delete').forEach(del => {
      del.addEventListener('click', e => {
        const idx = +e.target.dataset.idx;
        data.todos.splice(idx, 1);
        saveData();
        renderTodos();
      });
    });
  }

  // Notifications
  function renderNotifications() {
    const badge = document.getElementById('bellBadge');
    const unread = data.notifications.filter(n => !n.read).length;
    badge.textContent = unread;
    badge.classList.toggle('hidden', unread === 0);

    const list = document.getElementById('notifList');
    list.innerHTML = '';
    if (data.notifications.length === 0) {
      list.innerHTML = '<div class="notif-empty">No notifications</div>';
    } else {
      const sorted = [...data.notifications].sort((a, b) => b.time - a.time);
      sorted.forEach(n => {
        const div = document.createElement('div');
        div.className = 'notif-item' + (n.read ? '' : ' unread');
        div.innerHTML = `<div>${escapeHtml(n.text)}</div><div class="notif-time">${new Date(n.time).toLocaleString('en-GB')}</div>`;
        div.addEventListener('click', () => {
          n.read = true;
          saveData();
          renderNotifications();
        });
        list.appendChild(div);
      });
    }
  }

  function pushNotification(text) {
    data.notifications.push({ id: nextId(), text, time: Date.now(), read: false });
    saveData();
    renderNotifications();
  }

  // Reminder checker
  function checkReminders() {
    const now = Date.now();
    data.tasks.forEach(task => {
      (task.reminders || []).forEach(r => {
        if (!r.triggered && new Date(r.time).getTime() <= now) {
          r.triggered = true;
          pushNotification(`Reminder: ${task.title} — ${r.note || 'Check your task'}`);
        }
      });
    });
    saveData();
  }
  setInterval(checkReminders, 15000);
  checkReminders();

  // Modal
  const modalOverlay = document.getElementById('modalOverlay');
  document.getElementById('openModalBtn').addEventListener('click', () => {
    modalOverlay.classList.add('open');
    document.getElementById('mTitle').focus();
  });
  document.getElementById('modalCancel').addEventListener('click', () => {
    modalOverlay.classList.remove('open');
    clearModal();
  });
  modalOverlay.addEventListener('click', e => { if (e.target === modalOverlay) { modalOverlay.classList.remove('open'); clearModal(); } });

  function clearModal() {
    document.getElementById('mTitle').value = '';
    document.getElementById('mDesc').value = '';
    document.getElementById('mPriority').value = 'Medium';
    document.getElementById('mStatus').value = 'To Do';
  }

  document.getElementById('modalAdd').addEventListener('click', () => {
    const title = document.getElementById('mTitle').value.trim();
    const description = document.getElementById('mDesc').value.trim();
    const priority = document.getElementById('mPriority').value;
    const status = document.getElementById('mStatus').value;
    if (!title) return;

    const task = {
      id: nextId(),
      title,
      description,
      priority,
      status,
      created: Date.now(),
      comments: [],
      reminders: []
    };
    data.tasks.push(task);
    saveData();
    renderSVG();
    modalOverlay.classList.remove('open');
    clearModal();
    selectTask(task.id);
  });

  // Bell dropdown
  const bellWrap = document.getElementById('bellWrap');
  const notifDropdown = document.getElementById('notifDropdown');
  bellWrap.addEventListener('click', e => {
    e.stopPropagation();
    notifOpen = !notifOpen;
    notifDropdown.classList.toggle('open', notifOpen);
  });
  document.addEventListener('click', () => {
    notifOpen = false;
    notifDropdown.classList.remove('open');
  });
  document.getElementById('markAllRead').addEventListener('click', e => {
    e.stopPropagation();
    data.notifications.forEach(n => n.read = true);
    saveData();
    renderNotifications();
  });

  // Detail panel inputs
  document.getElementById('commentInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') {
      const text = e.target.value.trim();
      if (!text || !selectedTaskId) return;
      const task = data.tasks.find(t => t.id === selectedTaskId);
      if (!task) return;
      task.comments = task.comments || [];
      task.comments.push({ text, time: Date.now() });
      saveData();
      e.target.value = '';
      renderDetail();
      renderSVG();
    }
  });

  document.getElementById('setReminderBtn').addEventListener('click', () => {
    if (!selectedTaskId) return;
    const note = document.getElementById('reminderNote').value.trim();
    const timeStr = document.getElementById('reminderTime').value;
    if (!timeStr) return;
    const task = data.tasks.find(t => t.id === selectedTaskId);
    if (!task) return;
    task.reminders = task.reminders || [];
    task.reminders.push({ note, time: timeStr, triggered: false });
    saveData();
    document.getElementById('reminderNote').value = '';
    document.getElementById('reminderTime').value = '';
    renderDetail();
    renderSVG();
  });

  document.getElementById('deleteTaskBtn').addEventListener('click', () => {
    if (!selectedTaskId) return;
    if (!confirm('Delete this task?')) return;
    data.tasks = data.tasks.filter(t => t.id !== selectedTaskId);
    saveData();
    selectedTaskId = null;
    renderSVG();
    renderDetail();
  });

  // To-Do input
  document.getElementById('todoInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') {
      const text = e.target.value.trim();
      if (!text) return;
      data.todos.push({ text, done: false });
      saveData();
      e.target.value = '';
      renderTodos();
    }
  });

  // Utility
  function escapeHtml(s) {
    if (!s) return '';
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  // Resize SVG
  window.addEventListener('resize', () => { renderSVG(); });

  // Initial render
  renderSVG();
  renderDetail();
  renderTodos();
  renderNotifications();

  // If sample data desired, uncomment:
  // if (data.tasks.length === 0 && data.todos.length === 0) { ... }

})();
</script>
</body>
</html>
